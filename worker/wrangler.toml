name = "auto-clip-worker"
main = "src/index.js"
compatibility_date = "2026-07-18"

[vars]
PUBLIC_BASE_URL = "https://auto-clip-worker.apis-popov.workers.dev"

[observability]
enabled = true

[[containers]]
class_name = "ProcessorContainer"
image = "../Dockerfile"
max_instances = 1
instance_type = "standard-1"

[[durable_objects.bindings]]
name = "PROCESSOR"
class_name = "ProcessorContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProcessorContainer"]

[[r2_buckets]]
binding = "OUTPUTS"
bucket_name = "auto-clip-outputs"

[[queues.producers]]
binding = "AUTO_CLIP_JOBS"
queue = "auto-clip-jobs"

[[queues.consumers]]
queue = "auto-clip-jobs"
max_retries = 5
